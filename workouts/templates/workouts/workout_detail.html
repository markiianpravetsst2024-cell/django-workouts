{% extends "workouts/base.html" %}

{% block content %}
<h1>{{ workout.title }}</h1>

<div style="
  background: #fff;
  border: 1px solid #ddd;
  border-left: 4px solid {% if workout.is_done %}#4caf50{% else %}#e8a020{% endif %};
  border-radius: 6px;
  padding: 28px 32px;
  margin-bottom: 28px;
">
  <table style="border-collapse: collapse; width: 100%; font-size: 0.97rem;">
    <tr>
      <td style="padding: 10px 0; color: #888; width: 180px; vertical-align: top;">Тривалість</td>
      <td style="padding: 10px 0; font-weight: bold;">⏱ {{ workout.duration_min }} хв</td>
    </tr>
    <tr style="border-top: 1px solid #eee;">
      <td style="padding: 10px 0; color: #888; vertical-align: top;">Статус</td>
      <td style="padding: 10px 0;">
        {% if workout.is_done %}
          <span style="color: #4caf50; font-weight: bold;">✓ Виконано</span>
        {% else %}
          <span style="color: #e8a020; font-weight: bold;">⏳ Не виконано</span>
        {% endif %}
      </td>
    </tr>
    <tr style="border-top: 1px solid #eee;">
      <td style="padding: 10px 0; color: #888; vertical-align: top;">Дата створення</td>
      <td style="padding: 10px 0;">{{ workout.created_at|date:"d.m.Y H:i" }}</td>
    </tr>
  </table>
</div>

<a href="{% url 'workout_list' %}" style="
  color: #c47a10;
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: bold;
">← Назад до списку</a>
{% endblock %}
